name: Daily World Cup video → your phone

on:
  schedule:
    - cron: "0 6 * * *" # 06:00 UTC = 07:00 WAT — renders ALL of today's matches
  workflow_dispatch:
    inputs:
      date_offset:
        description: "Days ahead (0 = today, 1 = tomorrow)"
        required: false
        default: "0"
      posts_only:
        description: "Send text posts only, no video (true/false)"
        required: false
        default: "false"

jobs:
  build-and-deliver:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Fetch the day's matches
        env:
          API_FOOTBALL_KEY: ${{ secrets.API_FOOTBALL_KEY }}
          FOOTBALL_DATA_TOKEN: ${{ secrets.FOOTBALL_DATA_TOKEN }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          DATE_OFFSET: ${{ github.event.inputs.date_offset || '0' }}
        run: npm run fetch

      - name: Validate content before rendering (flags, facts, completeness)
        run: node scripts/validate.mjs

      - name: Render all videos
        if: ${{ github.event.inputs.posts_only != 'true' }}
        run: node scripts/render-all.mjs

      - name: Send videos to your phone (Telegram)
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          TEXT_ONLY: ${{ github.event.inputs.posts_only == 'true' && '1' || '0' }}
        run: node scripts/deliver.mjs

      - name: Keep a 7-day backup of the videos
        if: ${{ github.event.inputs.posts_only != 'true' }}
        uses: actions/upload-artifact@v4
        with:
          name: match-videos
          path: out/*.mp4
          retention-days: 7
