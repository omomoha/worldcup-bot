name: Daily World Cup video → your phone

on:
  schedule:
    - cron: "0 6 * * *" # 06:00 UTC = 07:00 WAT (your local 7am)
  workflow_dispatch: {} # also lets you trigger a video manually any time

jobs:
  build-and-deliver:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Fetch today's match data
        env:
          API_FOOTBALL_KEY: ${{ secrets.API_FOOTBALL_KEY }}
          FOOTBALL_DATA_TOKEN: ${{ secrets.FOOTBALL_DATA_TOKEN }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: npm run fetch

      - name: Render video
        run: npm run render

      - name: Send video to your phone (Telegram)
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: node scripts/deliver.mjs out/today.mp4

      - name: Post to TikTok (optional — skips if no keys)
        env:
          TIKTOK_CLIENT_KEY: ${{ secrets.TIKTOK_CLIENT_KEY }}
          TIKTOK_CLIENT_SECRET: ${{ secrets.TIKTOK_CLIENT_SECRET }}
          TIKTOK_REFRESH_TOKEN: ${{ secrets.TIKTOK_REFRESH_TOKEN }}
        run: npm run post

      - name: Keep a 7-day backup of the video
        uses: actions/upload-artifact@v4
        with:
          name: today-video
          path: out/today.mp4
          retention-days: 7
